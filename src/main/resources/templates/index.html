<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema FatecADS</title>

    <style>

        body{
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #004aad, #007bff);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container{
            background-color: white;
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        h1{
            color: #333;
            margin-bottom: 30px;
        }

        a{
            display: block;
            text-decoration: none;
            background-color: #007bff;
            color: white;
            padding: 12px;
            margin: 10px 0;
            border-radius: 5px;
            font-weight: bold;
            transition: 0.3s;
        }

        a:hover{
            background-color: #0056b3;
        }

    </style>

</head>
<body>

    <div class="container">

        <h1>Bem vindo ao Sistema FatecADS!</h1>

        <a href="/alunos/listar">Gerenciar Alunos</a>
        <a href="/cursos/listar">Gerenciar Cursos</a>
        <a href="/professores/listar">Gerenciar Professores</a>
        <a href="/disciplinas/listar">Gerenciar Disciplinas</a>

    </div>

</body>
</html>

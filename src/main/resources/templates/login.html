<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso ao Sistema</title>

    <style>

        body{
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #004aad, #007bff);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container{
            background-color: white;
            padding: 40px;
            border-radius: 10px;
            width: 350px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            text-align: center;
        }

        h1{
            color: #333;
            margin-bottom: 30px;
        }

        form{
            display: flex;
            flex-direction: column;
        }

        label{
            text-align: left;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
        }

        input{
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 14px;
            transition: 0.3s;
        }

        input:focus{
            outline: none;
            border-color: #007bff;
            box-shadow: 0 0 5px rgba(0,123,255,0.5);
        }

        button{
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 10px;
        }

        button:hover{
            background-color: #0056b3;
        }

        .mensagem{
            margin: 15px 0;
            padding: 10px;
            border-radius: 5px;
            font-weight: bold;
        }

        .erro{
            background-color: #f8d7da;
            color: #842029;
            border: 1px solid #f5c2c7;
        }

        .sucesso{
            background-color: #d1e7dd;
            color: #0f5132;
            border: 1px solid #badbcc;
        }

        .btn-home{
            background-color: #6c757d;
        }

        .btn-home:hover{
            background-color: #495057;
        }

    </style>

</head>
<body>

    <div class="container">

        <h1>Acesso ao Sistema</h1>

        <form method="post" th:action="@{/login}">

            <label for="username">Usuário:</label>
            <input 
                type="text" 
                id="username" 
                name="username" 
                placeholder="Digite seu usuário"
                required
            >

            <label for="password">Senha:</label>
            <input 
                type="password" 
                id="password" 
                name="password" 
                placeholder="Digite sua senha"
                required
            >

            <button type="submit">Entrar</button>

        </form>

        <p th:if="${param.error}" class="mensagem erro">
            Login inválido
        </p>

        <p th:if="${param.logout}" class="mensagem sucesso">
            Logout efetuado com sucesso
        </p>

        <form action="/fatecads" method="get">
            <button type="submit" class="btn-home">
                Voltar para Home
            </button>
        </form>

    </div>

</body>
</html>
